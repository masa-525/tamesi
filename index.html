<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>蜜の学び舎</title>
<style>
body {
    margin: 0;
    font-family: "Hiragino Kaku Gothic ProN", sans-serif;
    background-color: #fffaf2;
    color: #333;
}

header {
    background: linear-gradient(135deg, #f4b400, #ffcc33);
    padding: 40px 20px;
    text-align: center;
    color: white;
}

header h1 {
    margin: 0;
    font-size: 2.2em;
}

header p {
    margin-top: 10px;
    font-size: 1.1em;
}

nav {
    background-color: white;
    text-align: center;
    padding: 10px 0;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

nav a {
    margin: 0 15px;
    text-decoration: none;
    color: #f4b400;
    font-weight: bold;
}

section {
    padding: 50px 20px;
    max-width: 1000px;
    margin: auto;
}

h2 {
    text-align: center;
    margin-bottom: 30px;
    color: #f4b400;
}

.card {
    background: white;
    padding: 20px;
    margin: 15px 0;
    border-radius: 15px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.08);
}

.button {
    display: inline-block;
    background-color: #f4b400;
    color: white;
    padding: 12px 25px;
    border-radius: 30px;
    text-decoration: none;
    margin-top: 15px;
}

footer {
    background-color: #f4b400;
    color: white;
    text-align: center;
    padding: 20px;
}

/* スマホ対応 */
@media (max-width: 600px) {
    header h1 {
        font-size: 1.6em;
    }
}
</style>
</head>

<body>

<header>
    <h1>蜜の学び舎</h1>
    <p>地域や学校に笑顔を増やす</p>
</header>

<nav>
    <a href="#about">私たちについて</a>
    <a href="#service">サービス</a>
    <a href="#contact">お問い合わせ</a>
</nav>

<section id="about">
    <h2>私たちについて</h2>
    <div class="card">
        <p>
        蜜の学び舎は、「学びをもっと甘く、やさしく」をテーマにした学びの場です。
        子どもから大人まで、それぞれのペースで成長できる環境を大切にしています。
        </p>
    </div>
</section>

<section id="service">
    <h2>サービス内容</h2>

    <div class="card">
        <h3>学びサポート</h3>
        <p>基礎から応用まで、一人ひとりに合わせた指導を行います。</p>
    </div>

    <div class="card">
        <h3>特別講座</h3>
        <p>テーマ別の集中講座やワークショップを開催しています。</p>
    </div>

</section>

<section id="contact">
    <h2>お問い合わせ</h2>
    <div class="card">
        <p>ご質問・お申し込みは下記ボタンよりお願いいたします。</p>
        <a href="#" class="button">お問い合わせはこちら</a>
    </div>
</section>

<footer>
    <p>© 2026 蜜の学び舎 All Rights Reserved.</p>
</footer>

</body>
</html>
