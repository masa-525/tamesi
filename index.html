<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>スライダーサンプル</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
}

.slider {
  position: relative;
  width: 100%;
  height: 70vh;
  overflow: hidden;
}

.slides {
  display: flex;
  width: 300%;
  height: 100%;
  transition: transform 0.8s ease-in-out;
}

.slide {
  width: 100%;
  flex-shrink: 0;
  background-size: cover;
  background-position: center;
}

.slide1 { background-image: url("https://picsum.photos/1200/800?1"); }
.slide2 { background-image: url("https://picsum.photos/1200/800?2"); }
.slide3 { background-image: url("https://picsum.photos/1200/800?3"); }

.text {
  position: absolute;
  bottom: 20%;
  left: 10%;
  color: white;
  font-size: 2rem;
  background: rgba(0,0,0,0.4);
  padding: 15px 25px;
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="slider">
  <div class="slides" id="slides">
    <div class="slide slide1"></div>
    <div class="slide slide2"></div>
    <div class="slide slide3"></div>
</div>

<script>
let index = 0;
const slides = document.getElementById("slides");
const totalSlides = 3;

setInterval(() => {
  index++;
  if (index >= totalSlides) {
    index = 0;
  }
  slides.style.transform = `translateX(-${index * 100}%)`;
}, 4000);
</script>

</body>
</html>
